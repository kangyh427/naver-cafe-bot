# ============================================================
# 파일명: main.yml
# 경로:   kangyh427/naver_cafe_bot/.github/workflows/main.yml
# 역할:   GitHub Actions 자동 실행 스케줄 설정
#
# 작성일: 2026-03-09
# 버전:   v1.1
#
# [v1.1 — 2026-03-09]
#   Bug Fix: Playwright Chromium 설치 실패
#     - 원인: ubuntu-latest = Ubuntu 24.04
#             24.04에서 libasound2 패키지명 변경으로 --with-deps 실패
#     - 수정: runs-on ubuntu-latest → ubuntu-22.04 (안정 버전 고정)
#
# [v1.0 — 2026-03-09]
#   최초 작성
#
# 실행 시간:
#   한국시간(KST) 오전 9시 ~ 오후 11시, 30분마다
#   cron UTC 기준: KST = UTC+9
#     KST 09:00 = UTC 00:00
#     KST 23:00 = UTC 14:00
#
# 실행 흐름:
#   1. ubuntu-22.04 환경 구성
#   2. Python 3.11 설치 (pip 캐시 활성화)
#   3. requirements.txt 의존성 설치
#   4. Playwright Chromium 브라우저 설치
#   5. src/main.py 실행 (봇 메인 로직)
#
# 안전장치:
#   - timeout-minutes: 10 (무한 루프 방지)
#   - ubuntu-22.04 고정 (OS 업그레이드로 인한 패키지 오류 방지)
#   - GitHub Secrets으로 민감 정보 보호
#   - workflow_dispatch: 수동 실행 버튼 제공
# ============================================================

name: 네이버 카페 자동 관리봇

on:
  schedule:
    - cron: '0,30 0-14 * * *'
  workflow_dispatch:

jobs:
  run-cafe-bot:
    runs-on: ubuntu-22.04      # ubuntu-latest(24.04) libasound2 오류 방지
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      - name: 카페봇 실행
        env:
          NAVER_ID:             ${{ secrets.NAVER_ID }}
          NAVER_PW:             ${{ secrets.NAVER_PW }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          CAFE_ID:              ${{ secrets.CAFE_ID }}
          CAFE_URL:             ${{ secrets.CAFE_URL }}
        run: |
          cd src
          python main.py
