# ============================================================
# 파일명: main.yml
# 경로:   kangyh427/naver_cafe_bot/.github/workflows/main.yml
#
# 작성일: 2026-03-09
# 수정일: 2026-03-10 (v4.0)
# 버전:   v4.0
#
# [v4.0 — 2026-03-10]
#   수정: 매일 랜덤한 시각에 하루 3번 실행 (봇 탐지 회피 강화)
#     - cron은 각 시간대 시작에 1회만 실행 (3개)
#     - 봇 실행 전 0~59분 랜덤 sleep → 실제 시작 시각 매일 변동
#     - 오전: KST 10:00~10:59 사이 임의 시각
#     - 오후: KST 15:00~15:59 사이 임의 시각
#     - 저녁: KST 20:00~20:59 사이 임의 시각
#     - 수동 실행(workflow_dispatch)은 딜레이 없이 즉시 시작
#     - timeout: 75분 (최대 59분 대기 + 15분 실행 여유)
#
# [v3.0 — 2026-03-10]
#   수정: 18개 cron → 3개로 단순화 (고정 시각)
#
# 실행 시각 (KST 기준, 매일 변동):
#   오전 10:00~10:59 중 임의 1회
#   오후 15:00~15:59 중 임의 1회
#   저녁 20:00~20:59 중 임의 1회
#
# 안전장치:
#   - timeout-minutes: 40  (20분 대기 + 15분 실행 + 5분 여유)
#   - ubuntu-22.04 고정 (OS 패키지 오류 방지)
#   - concurrency: 동시 실행 방지
#   - 수동 실행 시 랜덤 딜레이 스킵 (즉시 실행)
# ============================================================

name: 네이버 카페 자동 관리봇

on:
  schedule:
    # ── 각 시간대 정시에 1회 트리거, 실제 실행은 랜덤 딜레이 후 ──
    # 오전 10:00 KST = UTC 01:00
    - cron: '0 1 * * *'
    # 오후 15:00 KST = UTC 06:00
    - cron: '0 6 * * *'
    # 저녁 20:00 KST = UTC 11:00
    - cron: '0 11 * * *'

  # 수동 실행 — 딜레이 없이 즉시 실행됨
  workflow_dispatch:

jobs:
  run-cafe-bot:
    runs-on: ubuntu-22.04
    # 최대 59분 대기 + 15분 실행 = 74분 → 75분으로 설정
    timeout-minutes: 40

    concurrency:
      group: cafe-bot-run
      cancel-in-progress: false

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      # ── 랜덤 딜레이 (자동 실행 시에만 적용) ─────────────────
      # schedule: 0~3599초(0~59분) 랜덤 대기 → 매일 다른 시각에 실행
      # workflow_dispatch: 이 스텝 스킵 → 즉시 실행
      - name: 🎲 랜덤 딜레이 (봇 탐지 회피)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 901 + 300))
          MINUTES=$((DELAY / 60))
          SECS=$((DELAY % 60))
          echo "=============================="
          echo "오늘의 랜덤 대기: ${MINUTES}분 ${SECS}초"
          echo "=============================="
          sleep $DELAY

      - name: 🤖 카페봇 실행
        env:
          NAVER_ID:             ${{ secrets.NAVER_ID }}
          NAVER_PW:             ${{ secrets.NAVER_PW }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          CAFE_ID:              ${{ secrets.CAFE_ID }}
          CAFE_URL:             ${{ secrets.CAFE_URL }}
          RUN_TRIGGER:          ${{ github.event_name }}
        run: |
          cd src
          python main.py
