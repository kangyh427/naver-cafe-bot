name: 네이버 카페 자동 관리봇

on:
  # 30분마다 자동 실행 (UTC 기준, 한국시간 = UTC+9)
  # 한국 오전 9시 ~ 오후 11시 사이에만 실행
  schedule:
    - cron: '0,30 0-14 * * *'   # 한국시간 09:00~23:00 (30분 간격)

  # 수동 실행 (GitHub Actions 탭에서 직접 실행 가능)
  workflow_dispatch:
    inputs:
      debug_mode:
        description: '디버그 모드 (상세 로그)'
        required: false
        default: 'false'

jobs:
  run-cafe-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 최대 15분 실행 제한

    steps:
      # 1. 코드 체크아웃
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      # 2. Python 환경 설정
      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 의존성 설치
      - name: 📦 패키지 설치
        run: |
          pip install -r requirements.txt

      # 4. Playwright 브라우저 설치
      - name: 🌐 Playwright Chromium 설치
        run: |
          playwright install chromium
          playwright install-deps chromium

      # 5. 봇 실행
      - name: 🤖 카페 관리봇 실행
        env:
          # GitHub Secrets에서 환경변수 주입
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_PW: ${{ secrets.NAVER_PW }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CAFE_ID: ${{ secrets.CAFE_ID }}
          CAFE_URL: ${{ secrets.CAFE_URL }}
        run: |
          cd src
          python main.py

      # 6. 실행 결과 알림 (실패 시)
      - name: ❌ 실패 알림
        if: failure()
        run: |
          echo "봇 실행 실패! GitHub Actions 로그를 확인하세요."
          echo "Supabase bot_run_logs 테이블에서 오류 내역 확인 가능"
